<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>QR Code Tool</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- 顶栏: Tab + 齿轮 -->
    <div class="topbar">
      <div class="tabs">
        <button class="tab active" data-tab="link">🔗 链接</button>
        <button class="tab" data-tab="text">📝 文本</button>
        <button class="tab" data-tab="image">📷 图片</button>
        <button class="tab" data-tab="file">📎 文件</button>
      </div>
      <button class="settings-btn" id="settings-btn" title="设置">⚙️</button>
    </div>

    <!-- Tab 1: 链接（原逻辑） -->
    <div class="tab-panel active" id="panel-link">
      <div class="url-section">
        <label class="label">URL / 文本</label>
        <input type="text" id="url-input"
               placeholder="输入链接或文本，按回车生成二维码"
               autocomplete="off" spellcheck="false" />
      </div>
      <div class="qr-section" id="qr-section">
        <div class="qr-placeholder" id="qr-loading">生成二维码中...</div>
        <img id="qr-img" class="qr-img" alt="QR Code" style="display:none;">
      </div>
    </div>

    <!-- Tab 2: 文本转短链 -->
    <div class="tab-panel" id="panel-text">
      <div class="url-section">
        <label class="label">粘贴文本（自动转短链二维码）</label>
        <textarea id="text-input"
                  placeholder="粘贴任意文本，按回车或点下方按钮生成短链二维码&#10;Shift+Enter 换行 · 手机扫码后可一键复制"
                  rows="4" spellcheck="false"></textarea>
      </div>
      <button class="generate-btn" id="generate-btn">🔲 生成二维码</button>
      <div class="status-row" id="text-status"></div>
      <div class="qr-section">
        <div class="qr-placeholder" id="text-qr-loading" style="display:none;">生成中...</div>
        <img id="text-qr-img" class="qr-img" alt="QR Code" style="display:none;">
      </div>
      <div class="short-link-row" id="short-link-row" style="display:none;">
        <span class="short-label">短链:</span>
        <a href="#" class="short-url" id="short-url" target="_blank"></a>
        <button class="copy-link-btn" id="copy-link-btn" title="复制短链">📋</button>
      </div>
    </div>

    <!-- Tab 3: 图片上传 -->
    <div class="tab-panel" id="panel-image">
      <div class="url-section">
        <label class="label" id="img-label">上传图片，生成扫码看图二维码</label>
        <input type="file" id="img-file-input" accept="image/*" style="display:none;">
        <div class="preview-area" id="img-preview-area">
          <div class="preview-placeholder" id="img-preview-placeholder">
            📁 点击选择图片<br>
            <span style="font-size:11px;color:#bbb;">或在此区域 Ctrl+V 粘贴截图</span>
          </div>
          <img id="img-preview" class="img-preview" alt="预览" style="display:none;">
        </div>
      </div>
      <button class="generate-btn" id="img-generate-btn" disabled>🔲 生成二维码</button>
      <div class="status-row" id="img-status"></div>
      <div class="qr-section">
        <div class="qr-placeholder" id="img-qr-loading" style="display:none;">生成中...</div>
        <img id="img-qr-img" class="qr-img" alt="QR Code" style="display:none;">
      </div>
      <div class="short-link-row" id="img-short-link-row" style="display:none;">
        <span class="short-label">短链:</span>
        <a href="#" class="short-url" id="img-short-url" target="_blank"></a>
        <button class="copy-link-btn" id="img-copy-link-btn" title="复制短链">📋</button>
      </div>
    </div>

    <!-- Tab 4: 文件上传 -->
    <div class="tab-panel" id="panel-file">
      <div class="url-section">
        <label class="label">选择任意文件，生成扫码下载二维码（上限 200MB）</label>
        <input type="file" id="file-file-input" style="display:none;">
        <div class="preview-area" id="file-preview-area">
          <div class="preview-placeholder" id="file-preview-placeholder">
            📁 点击选择文件<br>
            <span style="font-size:11px;color:#bbb;">或拖拽到此区域</span>
          </div>
          <div class="file-info" id="file-info" style="display:none;">
            <div class="file-icon" id="file-icon">📎</div>
            <div class="file-meta">
              <div class="file-name" id="file-name"></div>
              <div class="file-size" id="file-size-text"></div>
            </div>
          </div>
        </div>
      </div>
      <button class="generate-btn" id="file-generate-btn" disabled>🔲 生成二维码</button>
      <div class="status-row" id="file-status"></div>
      <div class="qr-section">
        <div class="qr-placeholder" id="file-qr-loading" style="display:none;">生成中...</div>
        <img id="file-qr-img" class="qr-img" alt="QR Code" style="display:none;">
      </div>
      <div class="short-link-row" id="file-short-link-row" style="display:none;">
        <span class="short-label">短链:</span>
        <a href="#" class="short-url" id="file-short-url" target="_blank"></a>
        <button class="copy-link-btn" id="file-copy-link-btn" title="复制短链">📋</button>
      </div>
    </div>
  </div>

  <script src="../lib/qrcode.min.js"></script>
  <script src="../config.js"></script>
  <script src="popup.js"></script>
</body>
</html>
